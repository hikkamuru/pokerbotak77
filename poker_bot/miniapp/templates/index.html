<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{{ club_name }}</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0a;
    --bg2: #141414;
    --bg3: #1c1c1c;
    --card: #181818;
    --border: #2a2a2a;
    --red: #c0392b;
    --red2: #e74c3c;
    --text: #ffffff;
    --text2: #aaaaaa;
    --text3: #666666;
    --accent: #c0392b;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Helvetica Neue', sans-serif; min-height: 100vh; overflow-x: hidden; }

  /* Nav */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0 8px; cursor: pointer; color: var(--text3); font-size: 10px; gap: 4px; transition: color .2s; }
  .nav-item.active { color: var(--red2); }
  .nav-item svg { width: 22px; height: 22px; }

  /* Pages */
  .page { display: none; padding: 16px 16px 80px; min-height: 100vh; }
  .page.active { display: block; }

  /* Header */
  .page-header { font-size: 22px; font-weight: 900; letter-spacing: 0.5px; margin-bottom: 16px; text-transform: uppercase; }

  /* Cards */
  .card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
  .card-title { font-weight: 800; font-size: 18px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  .card-meta { display: flex; gap: 16px; color: var(--text2); font-size: 13px; }
  .card-meta span { display: flex; align-items: center; gap: 4px; }

  /* Tournament card */
  .tournament-card { background: var(--card); border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: border-color .2s; }
  .tournament-card:active { border-color: var(--red); }
  .tournament-card .tc-body { padding: 14px 16px; }
  .tournament-card .tc-name { font-weight: 900; font-size: 17px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .tournament-card .tc-meta { display: flex; gap: 16px; color: var(--text2); font-size: 13px; }

  /* Hero banner */
  .hero-banner { background: linear-gradient(135deg, var(--red) 0%, #8b0000 100%); border-radius: 12px; padding: 20px; margin-bottom: 12px; cursor: pointer; position: relative; overflow: hidden; }
  .hero-banner::after { content: ''; position: absolute; right: -20px; top: -20px; width: 120px; height: 120px; background: rgba(255,255,255,0.05); border-radius: 50%; }
  .hero-banner .hb-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.7); margin-bottom: 6px; }
  .hero-banner .hb-title { font-size: 24px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; line-height: 1.1; }
  .hero-banner .hb-sub { display: flex; gap: 12px; margin-top: 10px; font-size: 13px; color: rgba(255,255,255,0.8); }

  /* Grid */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .grid-card { background: var(--card); border-radius: 12px; padding: 14px; border: 1px solid var(--border); cursor: pointer; }
  .grid-card .gc-title { font-weight: 800; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .grid-card .gc-sub { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 4px; }

  /* Rating table */
  .rating-header { display: grid; grid-template-columns: 32px 1fr 60px 60px 70px; gap: 4px; padding: 8px 12px; color: var(--text3); font-size: 12px; }
  .rating-row { display: grid; grid-template-columns: 32px 1fr 60px 60px 70px; gap: 4px; padding: 10px 12px; background: var(--card); border-radius: 10px; margin-bottom: 8px; align-items: center; }
  .rating-row .rr-rank { font-weight: 800; font-size: 15px; color: var(--text2); }
  .rating-row.top-1 .rr-rank { color: #FFD700; }
  .rating-row.top-2 .rr-rank { color: #C0C0C0; }
  .rating-row.top-3 .rr-rank { color: #CD7F32; }
  .rr-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rr-num { text-align: right; font-size: 13px; color: var(--text2); }
  .rr-rating { text-align: right; font-weight: 700; font-size: 14px; color: var(--text); }

  /* Profile */
  .profile-avatar { width: 72px; height: 72px; border-radius: 50%; background: var(--red); display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 900; margin: 0 auto 12px; }
  .profile-name { text-align: center; font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  .profile-rating { text-align: center; color: var(--text2); font-size: 14px; margin-bottom: 20px; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .stat-box { background: var(--card); border-radius: 10px; padding: 12px 8px; text-align: center; }
  .stat-val { font-size: 20px; font-weight: 900; }
  .stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .profile-row { display: flex; align-items: center; justify-content: space-between; background: var(--card); border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; }
  .profile-row-title { font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
  .profile-row-val { color: var(--text2); font-size: 13px; }

  /* Tabs */
  .tabs { display: flex; background: var(--bg2); border-radius: 10px; padding: 3px; margin-bottom: 16px; }
  .tab { flex: 1; text-align: center; padding: 8px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text2); }
  .tab.active { background: var(--red); color: #fff; }

  /* Filter chips */
  .chips { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; }
  .chips::-webkit-scrollbar { display: none; }
  .chip { background: var(--bg3); border-radius: 20px; padding: 6px 14px; font-size: 13px; white-space: nowrap; cursor: pointer; border: 1px solid var(--border); }
  .chip.active { background: var(--red); border-color: var(--red); color: #fff; }

  /* Search */
  .search-box { background: var(--bg3); border-radius: 10px; display: flex; align-items: center; padding: 10px 14px; margin-bottom: 14px; gap: 8px; }
  .search-box input { background: none; border: none; color: var(--text); font-size: 14px; flex: 1; outline: none; }
  .search-box input::placeholder { color: var(--text3); }

  /* Toggle */
  .toggle { width: 44px; height: 24px; background: var(--border); border-radius: 12px; position: relative; cursor: pointer; transition: background .2s; }
  .toggle.on { background: var(--red); }
  .toggle::after { content: ''; position: absolute; width: 18px; height: 18px; background: #fff; border-radius: 50%; top: 3px; left: 3px; transition: transform .2s; }
  .toggle.on::after { transform: translateX(20px); }

  /* Loader */
  .loader { text-align: center; padding: 40px; color: var(--text3); font-size: 14px; }

  /* Tournament detail */
  .detail-banner { background: linear-gradient(135deg, #1a0000 0%, var(--red) 50%, #8b0000 100%); border-radius: 12px; padding: 24px 20px; margin-bottom: 16px; }
  .detail-name { font-size: 26px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
  .detail-section { margin-bottom: 16px; }
  .detail-section h3 { font-size: 14px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .back-btn { display: flex; align-items: center; gap: 6px; color: var(--text2); font-size: 14px; cursor: pointer; margin-bottom: 16px; }

  /* Register btn */
  .register-btn { background: var(--red); color: #fff; border: none; border-radius: 12px; padding: 16px; width: 100%; font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; margin-top: 8px; }
  .register-btn.registered { background: var(--bg3); color: var(--text2); }
  .register-btn:active { opacity: 0.85; }
</style>
</head>
<body>

<!-- HOME PAGE -->
<div class="page active" id="page-home">
  <div id="home-content"><div class="loader">Загрузка...</div></div>
</div>

<!-- TOURNAMENTS PAGE -->
<div class="page" id="page-tournaments">
  <div class="page-header">Турниры</div>
  <div class="tabs">
    <div class="tab active" onclick="filterTournaments('upcoming')">Текущие</div>
    <div class="tab" onclick="filterTournaments('past')">Прошедшие</div>
  </div>
  <div id="tournaments-list"><div class="loader">Загрузка...</div></div>
</div>

<!-- RATING PAGE -->
<div class="page" id="page-rating">
  <div class="page-header">Рейтинг</div>
  <div class="tabs">
    <div class="tab active" onclick="switchRatingTab('season')">Сезонный</div>
    <div class="tab" onclick="switchRatingTab('global')">Глобальный</div>
  </div>
  <div class="search-box">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#666"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35" stroke-width="2" stroke-linecap="round"/></svg>
    <input type="text" placeholder="Поиск по никнейму" oninput="filterRating(this.value)" id="rating-search">
  </div>
  <div class="rating-header">
    <span>#</span><span>Никнейм</span><span style="text-align:right">Ноки</span><span style="text-align:right">PRO</span><span style="text-align:right">Рейтинг</span>
  </div>
  <div id="rating-list"><div class="loader">Загрузка...</div></div>
</div>

<!-- PROFILE PAGE -->
<div class="page" id="page-profile">
  <div id="profile-content"><div class="loader">Загрузка...</div></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="nav-item active" onclick="showPage('home')" id="nav-home">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <span>Главная</span>
  </div>
  <div class="nav-item" onclick="showPage('tournaments')" id="nav-tournaments">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94.63 1.5 1.98 2.63 3.61 2.96V19H7v2h10v-2h-4v-3.1c1.63-.33 2.98-1.46 3.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.84 10.4 5 9.3 5 8zm14 0c0 1.3-.84 2.4-2 2.82V7h2v1z"/></svg>
    <span>Турниры</span>
  </div>
  <div class="nav-item" onclick="showPage('rating')" id="nav-rating">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
    <span>Рейтинг</span>
  </div>
  <div class="nav-item" onclick="showPage('profile')" id="nav-profile">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    <span>Профиль</span>
  </div>
</nav>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.setHeaderColor('#0a0a0a');
tg.setBackgroundColor('#0a0a0a');

const API = '';  // relative URLs
let currentUser = null;
let allPlayers = [];
let allTournaments = [];

async function api(path) {
  try {
    const res = await fetch(API + path, {
      headers: { 'X-Telegram-Init-Data': tg.initData }
    });
    return await res.json();
  } catch(e) { return null; }
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'home') loadHome();
  if (name === 'tournaments') loadTournaments();
  if (name === 'rating') loadRating();
  if (name === 'profile') loadProfile();
}

// ── HOME ────────────────────────────────────────────────────────────────────
async function loadHome() {
  const [nearest, me] = await Promise.all([api('/api/nearest-tournament'), api('/api/me')]);
  currentUser = me;
  let html = '';
  if (nearest) {
    html += `<div class="hero-banner" onclick="openTournament(${nearest.id})">
      <div class="hb-label">Ближайший турнир</div>
      <div class="hb-title">${nearest.name}</div>
      <div class="hb-sub">
        <span>👥 ${nearest.current_players}/${nearest.max_players}</span>
        <span>🕐 ${nearest.date} / ${nearest.time}</span>
      </div>
    </div>`;
  }
  html += `<div class="hero-banner" style="background:linear-gradient(135deg,#8b0000,#c0392b)" onclick="showPage('rating')">
    <div class="hb-label">★ Рейтинг игроков</div>
    <div class="hb-title">Рейтинг<br>${'{{ club_name }}'}</div>
  </div>`;
  html += `<div class="grid-2">
    <div class="grid-card" onclick="showPage('tournaments')">
      <div class="gc-title">Турниры</div>
      <div class="gc-sub">🏆 Расписание</div>
    </div>
    <div class="grid-card" onclick="showPage('profile')">
      <div class="gc-title">Профиль</div>
      <div class="gc-sub">👤 Мои данные</div>
    </div>
  </div>`;
  document.getElementById('home-content').innerHTML = html;
}

// ── TOURNAMENTS ──────────────────────────────────────────────────────────────
let tournamentFilter = 'upcoming';
async function loadTournaments() {
  const data = await api('/api/tournaments?status=' + tournamentFilter);
  allTournaments = data || [];
  renderTournaments();
}
function filterTournaments(type) {
  tournamentFilter = type;
  document.querySelectorAll('#page-tournaments .tab').forEach((t,i) => t.classList.toggle('active', i === (type==='upcoming'?0:1)));
  loadTournaments();
}
function renderTournaments() {
  const el = document.getElementById('tournaments-list');
  if (!allTournaments.length) { el.innerHTML = '<div class="loader">Турниров пока нет</div>'; return; }
  el.innerHTML = allTournaments.map(t => `
    <div class="tournament-card" onclick="openTournament(${t.id})">
      <div class="tc-body">
        <div class="tc-name">${t.name}</div>
        <div class="tc-meta">
          <span>👥 ${t.current_players}/${t.max_players}</span>
          <span>🕐 ${t.date} / ${t.time}</span>
        </div>
      </div>
    </div>`).join('');
}

function openTournament(id) {
  // Show tournament detail inline
  const t = allTournaments.find(x => x.id === id);
  if (!t) return;
  const page = document.getElementById('page-tournaments');
  page.innerHTML = `
    <div class="back-btn" onclick="showPage('tournaments')">← Назад</div>
    <div class="detail-banner">
      <div class="detail-name">${t.name}</div>
    </div>
    <div class="detail-section">
      <h3>Когда и где</h3>
      <div class="card">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">📍 ${t.address || '{{ club_address }}'}</div>
        <div>🕐 ${t.date} / ${t.time}</div>
      </div>
    </div>
    <div class="detail-section">
      <h3>Участники</h3>
      <div class="card">
        <div style="font-size:18px;font-weight:800">${t.current_players} <span style="color:#666">/ ${t.max_players}</span></div>
        <div style="background:#2a2a2a;border-radius:4px;height:6px;margin-top:8px">
          <div style="background:var(--red);height:6px;border-radius:4px;width:${Math.round(t.current_players/t.max_players*100)}%"></div>
        </div>
      </div>
    </div>
    ${t.description ? `<div class="detail-section"><h3>Описание</h3><div class="card">${t.description}</div></div>` : ''}
    <button class="register-btn" onclick="registerTournament(${t.id}, this)">
      Зарегистрироваться
    </button>`;
}

async function registerTournament(id, btn) {
  btn.disabled = true;
  const res = await api('/api/register-tournament/' + id);
  if (res && res.status === 'success') {
    btn.textContent = '✅ Вы зарегистрированы';
    btn.classList.add('registered');
  } else if (res && res.status === 'already_registered') {
    btn.textContent = '✅ Уже зарегистрированы';
    btn.classList.add('registered');
  } else {
    btn.disabled = false;
    tg.showAlert(res?.message || 'Ошибка регистрации');
  }
}

// ── RATING ──────────────────────────────────────────────────────────────────
async function loadRating() {
  const data = await api('/api/leaderboard');
  allPlayers = data || [];
  renderRating(allPlayers);
}
function switchRatingTab(type) {
  document.querySelectorAll('#page-rating .tab').forEach((t,i) => t.classList.toggle('active', i === (type==='season'?0:1)));
}
function filterRating(q) {
  const filtered = q ? allPlayers.filter(p => (p.nickname||p.full_name||'').toLowerCase().includes(q.toLowerCase())) : allPlayers;
  renderRating(filtered);
}
function renderRating(players) {
  const el = document.getElementById('rating-list');
  if (!players.length) { el.innerHTML = '<div class="loader">Нет данных</div>'; return; }
  el.innerHTML = players.map((p,i) => {
    const topClass = i===0?'top-1':i===1?'top-2':i===2?'top-3':'';
    const name = p.nickname || p.full_name || 'Аноним';
    return `<div class="rating-row ${topClass}">
      <span class="rr-rank">${i+1}</span>
      <span class="rr-name">${name}</span>
      <span class="rr-num">${p.knockouts}</span>
      <span class="rr-num">${Number(p.pro_rating).toFixed(1)}</span>
      <span class="rr-rating">${p.rating}</span>
    </div>`;
  }).join('');
}

// ── PROFILE ──────────────────────────────────────────────────────────────────
async function loadProfile() {
  const me = await api('/api/me');
  if (!me) { document.getElementById('profile-content').innerHTML = '<div class="loader">Профиль не найден</div>'; return; }
  const initials = (me.nickname || me.full_name || '?')[0].toUpperCase();
  const notifClass = me.push_notifications ? 'on' : '';
  document.getElementById('profile-content').innerHTML = `
    <div class="profile-avatar">${initials}</div>
    <div class="profile-name">${me.nickname || me.full_name || 'Игрок'}</div>
    <div class="profile-rating">⭐ Рейтинг: ${me.rating} | PRO: ${Number(me.pro_rating).toFixed(1)}</div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-val">${me.games_played}</div><div class="stat-label">Игр</div></div>
      <div class="stat-box"><div class="stat-val">${me.knockouts}</div><div class="stat-label">Нокаутов</div></div>
      <div class="stat-box"><div class="stat-val">${me.games_won}</div><div class="stat-label">Побед</div></div>
    </div>
    <div class="profile-row">
      <div>
        <div class="profile-row-title">История игр</div>
        <div class="profile-row-val">🎮 ${me.games_played} игр</div>
      </div>
      <span style="color:#666">›</span>
    </div>
    <div class="profile-row">
      <div>
        <div class="profile-row-title">Free Entry</div>
        <div class="profile-row-val">🎟 ${me.free_entries} билетов</div>
      </div>
    </div>
    <div class="profile-row">
      <div class="profile-row-title">Пуш-уведомления</div>
      <div class="toggle ${notifClass}" onclick="toggleNotif(this)" id="notif-toggle"></div>
    </div>`;
}

async function toggleNotif(el) {
  el.classList.toggle('on');
  await api('/api/toggle-notifications');
}

// Init
loadHome();
loadRating();
</script>
</body>
</html>
